name: Daily Image Checker

# Crawls every page in the sitemap and flags any image that returns non-200.
# Runs daily at 9:30 AM UTC (10:30 Morocco), after the link checker.
# Safety: consumes no untrusted user input — only the public site is fetched.
on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-images:
    name: Verify all images return 200
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check images
        id: check
        run: node scripts/check-images.mjs

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: broken-images-report
          path: broken-images-report.md
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs")
            const date = new Date().toISOString().slice(0, 10)
            let body = `Des images cassées (HTTP ≠ 200) ont été détectées sur https://siyahamag.ma le ${date}.\n\n`
            try {
              body += fs.readFileSync("broken-images-report.md", "utf8")
            } catch (_) {
              body += "(Rapport non disponible.)"
            }
            body += `\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Images cassées détectées ${date}`,
              body,
              labels: ["image-checker", "automated", "bug"],
            })
