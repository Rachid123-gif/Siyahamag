name: Daily SEO Content

# Runs every day at 6:00 AM UTC (7:00 AM Morocco time)
# Safety: no untrusted user inputs are consumed in run blocks (only constants
# and self-generated step outputs).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    name: Generate and publish tourism news
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Run daily SEO script
        run: |
          set -e
          node scripts/daily-seo.mjs | tee seo-output.log
        continue-on-error: true

      - name: Check for new articles
        id: check
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new content generated today"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New content detected"
          fi

      - name: Extract new article URLs
        id: urls
        if: steps.check.outputs.has_changes == 'true'
        run: |
          NEW_DIRS=$(git diff --name-only --diff-filter=A | grep "src/app/(public)/news/" | awk -F/ '{print $5}' | sort -u)
          URLS=""
          for slug in $NEW_DIRS; do
            [ -n "$slug" ] && URLS="${URLS}https://siyahamag.ma/news/${slug},"
          done
          URLS="${URLS}https://siyahamag.ma/,https://siyahamag.ma/news-sitemap.xml,https://siyahamag.ma/feed.xml"
          URLS="${URLS%,}"
          echo "urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "Submitting URLs:"
          echo "$URLS" | tr ',' '\n'

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "SiyahaMag Bot"
          git config user.email "bot@siyahamag.ma"
          git add -A
          DATE_STR=$(date -u +'%Y-%m-%d')
          git commit -m "chore(seo): daily news articles ${DATE_STR}" || exit 0
          git push origin main

      - name: Submit URLs to IndexNow (Bing, Yandex)
        if: steps.check.outputs.has_changes == 'true'
        env:
          URLS: ${{ steps.urls.outputs.urls }}
        run: |
          sleep 60
          node scripts/indexnow.mjs

      - name: Ping Google about main sitemap
        if: steps.check.outputs.has_changes == 'true'
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://siyahamag.ma/sitemap.xml" || true
          curl -s "https://www.google.com/ping?sitemap=https://siyahamag.ma/news-sitemap.xml" || true
          echo "Google pinged for both sitemaps."

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-log-${{ github.run_id }}
          path: seo-output.log
          retention-days: 30
