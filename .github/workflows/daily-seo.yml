name: Daily SEO Content

# Runs every day at 6:00 AM UTC (7:00 AM Morocco time)
# Safety: no untrusted user inputs are consumed in run blocks (only constants
# and self-generated step outputs).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    name: Generate and publish tourism news
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Run daily SEO script
        env:
          # Free Google Gemini API. When set, articles are generated ORIGINAL.
          # When absent, the script falls back to thin (noindex) summaries.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          node scripts/daily-seo.mjs | tee seo-output.log
        continue-on-error: true

      - name: Check for new articles
        id: check
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new content generated today"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New content detected"
          fi

      - name: Extract new article URLs
        id: urls
        if: steps.check.outputs.has_changes == 'true'
        run: |
          NEW_DIRS=$(git diff --name-only --diff-filter=A | grep "src/app/(public)/news/" | awk -F/ '{print $5}' | sort -u)
          URLS=""
          for slug in $NEW_DIRS; do
            [ -n "$slug" ] && URLS="${URLS}https://siyahamag.ma/news/${slug},"
          done
          URLS="${URLS}https://siyahamag.ma/,https://siyahamag.ma/news-sitemap.xml,https://siyahamag.ma/feed.xml"
          URLS="${URLS%,}"
          echo "urls=$URLS" >> "$GITHUB_OUTPUT"
          # Only deploy + notify search engines when REAL new /news pages exist
          # (state/log files change every run — don't trigger a deploy for those).
          if [ -z "$NEW_DIRS" ]; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new article pages — will commit logs only, skip deploy."
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi
          echo "Submitting URLs:"
          echo "$URLS" | tr ',' '\n'

      - name: Commit and push changes
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "SiyahaMag Bot"
          git config user.email "bot@siyahamag.ma"
          git add -A
          DATE_STR=$(date -u +'%Y-%m-%d')
          git commit -m "chore(seo): daily news articles ${DATE_STR}" || exit 0
          git push origin main

      - name: Deploy to Netlify
        # IMPORTANT: this Netlify site is NOT connected to the GitHub repo, so a
        # git push does NOT auto-deploy. We build + deploy explicitly here so the
        # new pages actually go live before we notify search engines. The CLI
        # pulls the site's env vars from Netlify via NETLIFY_AUTH_TOKEN.
        if: steps.urls.outputs.has_new == 'true'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::warning::NETLIFY_AUTH_TOKEN not set — skipping deploy (site won't update)."
            exit 0
          fi
          npx --yes netlify-cli@latest deploy --build --prod \
            --site dbdfdf5f-5f95-4a00-9c86-8faa87423c6f \
            --message "daily SEO content $(date -u +'%Y-%m-%d')"

      - name: Submit URLs to IndexNow (Bing, Yandex)
        if: steps.urls.outputs.has_new == 'true'
        env:
          URLS: ${{ steps.urls.outputs.urls }}
        run: |
          sleep 60
          node scripts/indexnow.mjs

      - name: Submit URLs to Google Indexing API
        # Notifies Google directly (faster than waiting for a crawl). No-op if
        # GOOGLE_INDEXING_SA_JSON isn't configured. Replaces the deprecated
        # sitemap "ping" endpoint, which Google removed in 2023.
        if: steps.urls.outputs.has_new == 'true'
        env:
          URLS: ${{ steps.urls.outputs.urls }}
          GOOGLE_INDEXING_SA_JSON: ${{ secrets.GOOGLE_INDEXING_SA_JSON }}
        run: node scripts/google-index.mjs

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-log-${{ github.run_id }}
          path: seo-output.log
          retention-days: 30
